name: Scraper Stanovi Beograd

on:
  schedule:
    # Svaki sat od 08:00 do 00:00 po beogradskom vremenu (UTC+2 leti)
    # UTC: 06:00–22:00  →  Beograd: 08:00–00:00
    - cron: '0 6-22 * * *'

  # Omogućava ručno pokretanje iz GitHub-a (Actions tab → Run workflow)
  workflow_dispatch:

concurrency:
  group: scraper
  cancel-in-progress: false   # Čekaj da prethodni završi, ne otkazuj ga

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Potrebno da bi mogao da commituje seen.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Podesi Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instaliraj zavisnosti
        run: pip install -r requirements.txt

      - name: Pokreni scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_EXTRA_CHAT_IDS: ${{ secrets.TELEGRAM_EXTRA_CHAT_IDS }}
          MAX_PRICE_PER_M2: '2000'
        run: python scraper.py

      - name: Sačuvaj seen.json u repo
        continue-on-error: true   # Push greška ne ubija workflow — scraping je uspeo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git add seen.json
            git diff --staged --quiet || git commit -m "chore: update seen.json [skip ci]"
            git push && break
            echo "Push attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
